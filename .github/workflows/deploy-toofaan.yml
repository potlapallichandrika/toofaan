name: Deploy PHP Site (Toofaan)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Deploy changed files only (SAFE)
      - name: Deploy to Server
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='config.php' \
            --exclude='uploads/' \
            ./ /var/www/html/toofaan/

      # 3. Set permissions (optional)
      - name: Set Permissions
        run: |
          chown -R $USER:$USER /var/www/html/toofaan/
