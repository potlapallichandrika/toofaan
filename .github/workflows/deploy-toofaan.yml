name: Deploy Toofaan (Moodle)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Deploy to server
      - name: Deploy to Server
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='config.php' \
            --exclude='cache/' \
            --exclude='localcache/' \
            ./ /var/www/html/toofaan/

      # 3. Fix permissions (VERY IMPORTANT)
      - name: Set Permissions
        run: |
          sudo chown -R www-data:www-data /var/www/html/toofaan
          sudo chmod -R 755 /var/www/html/toofaan

      # 4. Purge Moodle cache
      - name: Purge Cache
        run: |
          sudo -u www-data php /var/www/html/toofaan/admin/cli/purge_caches.php
